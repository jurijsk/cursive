name: Azure Static Web Apps CI/CD

on:
  push:
    branches: [master]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [master]

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Upgrade npm
        # The lock file is generated locally with npm 11, which correctly
        # omits optional peerDependencies (e.g. cac/commander under
        # @bomb.sh/tab). Node 20 ships with npm 10.8, which treats the
        # same lock as out-of-sync. Bumping CI to npm 11 reconciles them.
        run: npm install --global npm@latest
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          # With skip_app_build: true the action ignores output_location and
          # treats app_location as the already-built artifacts directory, so
          # point it at .output/public directly. api_location stays relative
          # to the repo root and points at the Nitro-emitted Functions app
          # (host.json at root of .output/server, function under functions/).
          # NOTE: api build is NOT skipped — Oryx needs to inspect the api
          # folder to detect the Node language. Without that, the deploy
          # action fails with "Function language info isn't provided".
          # Oryx will see package.json, identify Node, and the bundled
          # WASM/fonts in chunks/raw/ are unaffected (they're code, not deps).
          app_location: ".output/public"
          api_location: ".output/server"
          # Nitro writes staticwebapp.config.json at the repo root, but the
          # deploy action defaults to looking inside app_location. Without
          # this override the routing config (which rewrites / and unknown
          # paths to /api/server) is never applied and SWA falls back to
          # the empty Nitro-generated index.html stub — every page returns
          # 200 with 0 bytes and the SSR function is never invoked.
          config_file_location: "/"
          skip_app_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"
