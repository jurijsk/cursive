name: Azure Static Web Apps CI/CD

on:
  push:
    branches: [master]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [master]
  workflow_dispatch:

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Upgrade npm
        # The lock file is generated locally with npm 11, which correctly
        # omits optional peerDependencies (e.g. cac/commander under
        # @bomb.sh/tab). Node 20 ships with npm 10.8, which treats the
        # same lock as out-of-sync. Bumping CI to npm 11 reconciles them.
        run: npm install --global npm@latest
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          # With skip_app_build: true the action ignores output_location and
          # treats app_location as the already-built artifacts directory, so
          # point it at .output/public directly. api_location stays relative
          # to the repo root and points at the Nitro-emitted Functions app
          # (host.json at root of .output/server, function under functions/).
          # NOTE: api build is NOT skipped — Oryx needs to inspect the api
          # folder to detect the Node language. Without that, the deploy
          # action fails with "Function language info isn't provided".
          # Oryx will see package.json, identify Node, and the bundled
          # WASM/fonts in chunks/raw/ are unaffected (they're code, not deps).
          app_location: ".output/public"
          api_location: ".output/server"
          # Nitro writes staticwebapp.config.json at the repo root, but the
          # deploy action defaults to looking inside app_location. Without
          # this override the routing config (which rewrites / and unknown
          # paths to /api/server) is never applied and SWA falls back to
          # the empty Nitro-generated index.html stub — every page returns
          # 200 with 0 bytes and the SSR function is never invoked.
          config_file_location: "/"
          skip_app_build: true

      - name: Post-deploy smoke test
        # Catches the regressions hit on the road to first deploy:
        #   - SSR returning empty body (routing config missing → fallback
        #     to empty Nitro index.html stub)
        #   - /api/shape failing (server asset bundling broken, function
        #     language detection missing, etc.)
        # Uses the deploy action's static_web_app_url output so it picks up
        # both production and per-PR preview URLs without hardcoding.
        run: |
          set -u
          URL="${{ steps.builddeploy.outputs.static_web_app_url }}"
          if [ -z "$URL" ]; then
            echo "FAIL: deploy step did not output static_web_app_url"
            exit 1
          fi
          case "$URL" in https://*) ;; *) URL="https://$URL" ;; esac
          echo "smoke-testing $URL"

          # SWA propagation + Function cold start can take ~30-60s after the
          # deploy step reports success. Poll for an HTTP 200 first.
          for i in $(seq 1 12); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL/")
            if [ "$CODE" = "200" ]; then break; fi
            echo "  attempt $i: $CODE — waiting 5s"
            sleep 5
          done

          # 1) SSR-rendered root: must return non-trivial HTML with a title.
          HTML=$(curl --fail --silent --show-error "$URL/")
          SIZE=${#HTML}
          if [ "$SIZE" -lt 1000 ]; then
            echo "FAIL: GET / returned $SIZE bytes (expected >1000 — SSR likely not running)"
            echo "$HTML" | head -c 500
            exit 1
          fi
          if ! echo "$HTML" | grep -qE '<title>[^<]+</title>'; then
            echo "FAIL: GET / returned HTML without a <title> tag"
            exit 1
          fi
          echo "ok: GET / -> $SIZE bytes, title rendered"

          # 2) /api/shape: must shape Arabic input into ≥5 glyphs.
          RESP=$(curl --fail --silent --show-error -X POST \
            -H 'content-type: application/json; charset=utf-8' \
            --data-raw '{"text":"مرحبا","font":"tajawal"}' \
            "$URL/api/shape")
          GLYPHS=$(echo "$RESP" | jq -r '.glyphs | length // 0')
          if [ "$GLYPHS" -lt 5 ]; then
            echo "FAIL: POST /api/shape returned $GLYPHS glyphs (expected >=5)"
            echo "$RESP" | head -c 500
            exit 1
          fi
          echo "ok: POST /api/shape -> $GLYPHS glyphs"

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"
